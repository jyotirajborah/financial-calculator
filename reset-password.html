<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FinCalc</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>
    <div class="reset-password-container">
        <div class="reset-password-card glass-card">
            <div class="logo">
                <ion-icon name="wallet"></ion-icon>
                <span>FinCalc</span>
            </div>
            
            <div class="reset-header">
                <ion-icon name="key" class="reset-icon"></ion-icon>
                <h2>Reset Your Password</h2>
                <p>Enter your new password below</p>
            </div>
            
            <form id="reset-password-form">
                <div class="reset-error" id="reset-error"></div>
                <div class="reset-success" id="reset-success"></div>
                
                <div class="input-group">
                    <label for="new-password">New Password</label>
                    <div class="input-wrapper">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" id="new-password" placeholder="Enter new password" required minlength="6">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" id="confirm-password" placeholder="Confirm new password" required minlength="6">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" id="reset-btn">
                    <ion-icon name="checkmark-circle"></ion-icon>
                    Reset Password
                </button>
                
                <div class="reset-links">
                    <a href="/" class="back-link">
                        <ion-icon name="arrow-back"></ion-icon>
                        Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Extract tokens from URL
        const urlParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = urlParams.get('access_token');
        const refreshToken = urlParams.get('refresh_token');
        
        if (!accessToken || !refreshToken) {
            document.getElementById('reset-error').textContent = 'Invalid or expired reset link. Please request a new one.';
            document.getElementById('reset-password-form').style.display = 'none';
        }
        
        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorElement = document.getElementById('reset-error');
            const successElement = document.getElementById('reset-success');
            const resetBtn = document.getElementById('reset-btn');
            
            // Clear previous messages
            errorElement.textContent = '';
            successElement.textContent = '';
            
            // Validate passwords
            if (newPassword !== confirmPassword) {
                errorElement.textContent = 'Passwords do not match.';
                return;
            }
            
            if (newPassword.length < 6) {
                errorElement.textContent = 'Password must be at least 6 characters long.';
                return;
            }
            
            // Show loading state
            const originalText = resetBtn.innerHTML;
            resetBtn.innerHTML = '<ion-icon name="sync"></ion-icon> Resetting...';
            resetBtn.disabled = true;
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_token: accessToken,
                        refresh_token: refreshToken,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successElement.textContent = 'Password reset successfully! Redirecting to login...';
                    document.getElementById('reset-password-form').reset();
                    
                    // Redirect to main app after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    errorElement.textContent = data.error || 'Failed to reset password.';
                }
            } catch (error) {
                console.error('Reset password error:', error);
                errorElement.textContent = 'Network error. Please try again.';
            } finally {
                // Restore button state
                resetBtn.innerHTML = originalText;
                resetBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
