<!DOCTYPE html>
<html>
<head>
    <title>Auth Test</title>
</head>
<body>
    <h1>Authentication Test</h1>
    <button onclick="testSignup()">Test Signup</button>
    <button onclick="testLogin()">Test Login</button>
    <div id="result"></div>

    <script>
        async function testSignup() {
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: 'Test User', 
                        email: 'test@example.com', 
                        password: 'testpass123' 
                    })
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = 'Signup: ' + JSON.stringify(data);
            } catch (error) {
                document.getElementById('result').innerHTML = 'Signup Error: ' + error.message;
            }
        }

        async function testLogin() {
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: 'test@example.com', 
                        password: 'testpass123' 
                    })
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = 'Login: ' + JSON.stringify(data);
            } catch (error) {
                document.getElementById('result').innerHTML = 'Login Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
